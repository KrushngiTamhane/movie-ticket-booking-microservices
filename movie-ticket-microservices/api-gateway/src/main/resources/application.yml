server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: movie-service
          uri: http://localhost:8081
          predicates:
            - Path=/movies

        - id: theater-service
          uri: http://localhost:8082
          predicates:
            - Path=/theaters

        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/bookings

        - id: user-service
          uri: http://localhost:8084
          predicates:
            - Path=/users

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka